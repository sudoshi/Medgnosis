@version: 3.38
@include "scl.conf"

# ---------------------------------------------------------------------------
# Medgnosis ATNA Audit Record Repository (ARR)
#
# Receives IHE ATNA audit messages shipped by medgnosis-santempi (SanteDB MPI)
# over syslog and persists them to dated files under /var/log/atna (a named
# volume). This is the external audit-repository-of-record that was missing and
# caused the ship queue to grow unbounded. SanteDB ships over UDP (RFC 5426),
# which is fire-and-forget, so the santempi dispatch queue always drains and can
# never spin again on a dispatcher failure.
# ---------------------------------------------------------------------------

options {
    create-dirs(yes);
    log-msg-size(262144);     # ATNA/DICOM audit messages with many participants
    ts-format(iso);
    keep-hostname(yes);
    use-dns(no);
    stats-freq(0);
};

source s_atna {
    # SanteDB's AUDIT_SHIP feature targets sdb-audit:11514 by default. Listen on
    # both UDP and TCP so whichever transport SanteDB uses is captured.
    # no-parse: keep the entire ATNA payload (DICOM audit XML) verbatim.
    network(transport("udp") port(11514) flags(no-parse) so-rcvbuf(8388608));
    network(transport("tcp") port(11514) flags(no-parse) max-connections(50));
};

destination d_atna_file {
    file("/var/log/atna/audit-${YEAR}${MONTH}${DAY}.log"
         template("${ISODATE} ${SOURCEIP} ${MESSAGE}\n")
         create-dirs(yes));
};

log {
    source(s_atna);
    destination(d_atna_file);
};
