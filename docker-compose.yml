# =============================================================================
# Medgnosis — Production Docker Compose
# Replaces systemd-based deployment. PostgreSQL stays on host.
# Usage: docker compose up --build -d
# =============================================================================

name: medgnosis

services:
  # ── nginx: reverse proxy + SPA static files ──
  nginx:
    container_name: medgnosis-nginx
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-3081}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/nginx-health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - medgnosis

  # ── api: Fastify REST API ──
  api:
    container_name: medgnosis-api
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env
    environment:
      # Docker-internal URLs (override any .env defaults for container networking)
      REDIS_URL: redis://redis:6379
      SOLR_URL: http://solr:8983/solr
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      solr:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    networks:
      - medgnosis

  # ── worker: BullMQ background job processor ──
  worker:
    container_name: medgnosis-worker
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["node", "apps/api/dist/worker.js"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    networks:
      - medgnosis

  # ── redis: cache, BullMQ queue, WebSocket pub/sub ──
  redis:
    container_name: medgnosis-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    networks:
      - medgnosis

  # ── solr: search + clinical cores ──
  solr:
    container_name: medgnosis-solr
    image: solr:9.7-slim
    command: >
      bash -c "
        precreate-core search /opt/solr/server/solr/configsets/search;
        precreate-core clinical /opt/solr/server/solr/configsets/clinical;
        exec solr-foreground
      "
    expose:
      - "8983"
    environment:
      SOLR_JAVA_MEM: "-Xms2g -Xmx4g"
    volumes:
      - solr_data:/var/solr
      - ./solr/search/conf:/opt/solr/server/solr/configsets/search/conf:ro
      - ./solr/clinical/conf:/opt/solr/server/solr/configsets/clinical/conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8983/solr/admin/info/system"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    networks:
      - medgnosis

  # ── mailpit: dev email capture (replaces MailHog) ──
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped
    profiles:
      - dev
    networks:
      - medgnosis

  # ── cql-engine: HAPI FHIR clinical-reasoning sidecar (Measure/$evaluate-measure) ──
  # Opt-in (profile 'cql'): `docker compose --profile cql up -d cql-engine`.
  # Internal only (no published port) — the api reaches it at
  # http://cql-engine:8080/fhir via the medgnosis network (CQL_ENGINE_URL).
  # Distroless image (no shell/curl) → no container healthcheck; readiness is
  # polled by callers (scripts/cql-engine-smoke.sh) and the cql MeasureEvaluator
  # retries on connect. The api does NOT depend on it (MEASURE_EVALUATOR=sql default).
  cql-engine:
    container_name: medgnosis-cql-engine
    image: hapiproject/hapi:latest
    environment:
      hapi.fhir.cr.enabled: "true"
      # CMS measure/test bundles carry example references (e.g. Practitioner/example);
      # relax referential integrity so dQM test decks load.
      hapi.fhir.enforce_referential_integrity_on_write: "false"
      hapi.fhir.allow_external_references: "true"
      JAVA_OPTS: "-Xmx1300m -Xms512m"
    restart: unless-stopped
    profiles:
      - cql
    deploy:
      resources:
        limits:
          memory: 1800M
          cpus: "2"
    networks:
      - medgnosis

  # Enterprise Master Patient Index — probabilistic Patient/$match for the EMPI
  # Phase 1 (see docs/EMPI-SANTEMPI-SETUP.md). Off by default; start with:
  #   docker compose --profile mpi up -d santempi
  # and set MPI_ENABLED=true (+ MPI_BASE_URL/MPI_MASTER_ID_SYSTEM) on the api.
  #
  # Dedicated Postgres, isolated from the application/prod database. The
  # credentials below are a throwaway for this internal-only sidecar (the port
  # is not published); SanteDB creates and maintains the santedb + audit schemas.
  santedb-db:
    container_name: medgnosis-santedb-db
    deploy:
      resources:
        limits:
          memory: 2048M
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: santedb
      POSTGRES_PASSWORD: SanteDB123
      POSTGRES_DB: santedb
    volumes:
      - santedb_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - mpi
    networks:
      - medgnosis

  # IHE ATNA Audit Record Repository (ARR) for the MPI.
  # SanteDB ships audits here over syslog (UDP, fire-and-forget); this sidecar
  # persists them to dated files on a volume. Required so the santempi audit
  # ship queue actually drains — without a dispatcher it grew to 2.5M files and
  # pegged a core (2026-06-20). See docker/santempi/syslog-ng.conf.
  santedb-arr:
    container_name: medgnosis-santedb-arr
    image: balabit/syslog-ng:latest
    command: ["--foreground", "--no-caps"]
    volumes:
      - ./docker/santempi/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - santedb_arr_logs:/var/log/atna
    restart: unless-stopped
    profiles:
      - mpi
    networks:
      medgnosis:
        # SanteDB's AUDIT_SHIP feature hardcodes the default audit target
        # sdb-audit:11514. Expose the sidecar under that name so the default
        # resolves (the SDB_AUDIT_SHIP_* env overrides are not honored because
        # the feature id contains an underscore, breaking the SDB_<ID>_<KEY> split).
        aliases:
          - sdb-audit

  santempi:
    container_name: medgnosis-santempi
    image: santesuite/santedb-mpi:latest
    depends_on:
      - santedb-db
      - santedb-arr
    environment:
      # Feature set for a FHIR-exposed MPI with the weighted matching engine + MDM.
      # AUDIT_SHIP is SanteDB's IHE ATNA audit dispatcher (feature id confirmed
      # from the runtime's known-feature list). It ships audits to its default
      # target sdb-audit:11514, which resolves to the santedb-arr sidecar via the
      # network alias above. The dispatcher makes the ship queue actually drain,
      # so the 2.5M-file spin (2026-06-20) cannot recur.
      SDB_FEATURE: "LOG;DATA_POLICY;AUDIT_REPO;AUDIT_SHIP;ADO;PUBSUB_ADO;RAMCACHE;SEC;SWAGGER;OPENID;FHIR;HDSI;AMI;BIS;MDM;MATCHING;IHE_PIXM;IHE_PDQM;IHE_PMIR"
      SDB_MATCHING_MODE: "WEIGHTED"
      SDB_MDM_RESOURCE: "Patient"
      SDB_DATA_POLICY_ACTION: "HIDE"
      SDB_DELAY_START: "5000"
      SDB_DB_MAIN_PROVIDER: "Npgsql"
      SDB_DB_AUDIT_PROVIDER: "Npgsql"
      SDB_DB_MAIN: "server=santedb-db;port=5432;database=santedb;user id=santedb;password=SanteDB123;pooling=true;MinPoolSize=5;MaxPoolSize=15;Timeout=60;"
      SDB_DB_AUDIT: "server=santedb-db;port=5432;database=auditdb;user id=santedb;password=SanteDB123;pooling=true;MinPoolSize=5;MaxPoolSize=15;Timeout=60;"
    volumes:
      - santempi_data:/santedb
      # ship="false" override: no ATNA central dispatcher is registered (ATNA is
      # not in SDB_FEATURE), so shipping audits floods queue/sys.audit forever and
      # pegs a core. Local audit persistence (auditdb) is unaffected. See file header.
      - ./docker/santempi/santedb.audit_accountability.config.xml:/santedb/config/santedb.audit_accountability.config.xml:ro
    ports:
      - "8099:8080" # FHIR base at http://localhost:8099/fhir (host); santempi:8080 in-network
    restart: unless-stopped
    profiles:
      - mpi
    deploy:
      resources:
        limits:
          # SanteDB MDM holds a large in-memory matching working set; 2G was
          # exhausted at ~56k patients (the container restarted mid-backfill).
          # Bumped for the ~1M population; watch the trajectory as coverage grows.
          memory: 8192M
          cpus: "2"
    networks:
      - medgnosis

volumes:
  redis_data:
  solr_data:
  santempi_data:
  santedb_db_data:
  santedb_arr_logs:

networks:
  medgnosis:
    driver: bridge
