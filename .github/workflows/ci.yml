name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DATABASE_URL: postgres://medgnosis:medgnosis_dev@localhost:5432/medgnosis_dev
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-secret-not-for-production
  NODE_ENV: test

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: medgnosis
          POSTGRES_PASSWORD: medgnosis_dev
          POSTGRES_DB: medgnosis_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medgnosis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run db:migrate
      - run: npx turbo run test

  fhir-conformance:
    name: FHIR Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache FHIR validator + IG packages
        uses: actions/cache@v4
        with:
          path: |
            validator_cli.jar
            ~/.fhir
          key: fhir-validator-uscore700-qicore702-deqm500-v1
      - name: Download HL7 validator
        run: test -f validator_cli.jar || curl -fsSL -o validator_cli.jar https://github.com/hapifhir/org.hl7.fhir.core/releases/latest/download/validator_cli.jar
      - name: Validate FHIR fixtures (errors fail the build)
        run: ./scripts/fhir-validate.sh
      - name: Validate DEQM Gaps-in-Care sample against DEQM 5.0.0 (errors fail the build)
        run: ./scripts/deqm-validate.sh

  reporting-conformance:
    name: Reporting Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Validate QRDA Cat I/Cat III local structural fixtures
        run: ./scripts/qrda-validate.sh
      - name: Validate QPP JSON local structural fixture
        run: ./scripts/qpp-validate.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx turbo run build
        env:
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: medgnosis
          POSTGRES_PASSWORD: medgnosis_dev
          POSTGRES_DB: medgnosis_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U medgnosis"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm exec --workspace=apps/web -- playwright install --with-deps chromium
      - run: npx turbo run build
        env:
          NODE_ENV: production
      - run: npx turbo run db:migrate && npx turbo run db:seed
      - name: Role/admin operational E2E release smoke
        run: PLAYWRIGHT_PORT=5176 npm run test:e2e:release --workspace=apps/web
      - name: Full web E2E suite
        run: PLAYWRIGHT_PORT=5177 npm run test:e2e --workspace=apps/web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=critical
      - run: npm audit --audit-level=high
        continue-on-error: true
